name: fbfitnessapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.1.0
  provider: ^6.1.5
  curved_navigation_bar: ^1.0.6
  video_player: ^2.9.5
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.8
  intl: ^0.20.2
  syncfusion_flutter_charts: ^29.2.9
  flutter_launcher_icons: ^0.14.3
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.6
  flutter_lints: ^5.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/Fitbodylogo.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/icons/Fitbodylogo.png
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/icons/Fitbodylogo.png
    - assets/icons/workout-svgrepo-com.svg

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-italic.ttf
          style: italic
